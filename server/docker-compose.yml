# JuiceMount server-side stack (Tier 3, iter 1)
#
# `docker compose up -d` boots the three backing services:
#   - minio        — S3-compatible object store on :9000 (S3 API) and :9001 (web)
#   - redis        — JuiceFS metadata authority on :6379
#   - juicefs-init — one-shot that formats the JuiceFS volume on first run
#
# This is the FOUNDATION. Tier-3 iter-2 adds the juicemount-server
# container (the NFS export side) and a Caddy reverse-proxy. With
# those, the stack matches the architecture diagram in
# docs/ROADMAP/tier-3-server-packaging.md.
#
# Usage from a fresh Ubuntu / Synology / TrueNAS box:
#
#   cp .env.example .env
#   $EDITOR .env                       # set MINIO_ROOT_PASSWORD, paths
#   docker compose up -d
#   docker compose logs juicefs-init   # confirms first-time format
#
# Acceptance: `docker compose ps` shows minio + redis healthy and
# juicefs-init exited 0. Data persists across `docker compose down`
# via the named volumes below.

services:
  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: juicemount-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-juicemount}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set in .env}
    ports:
      - "${MINIO_S3_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ${MINIO_DATA_DIR:-./data/minio}:/data
    healthcheck:
      # MinIO's documented liveness endpoint. 200 = healthy, anything
      # else = restart by Docker's default policy.
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7.4-alpine
    container_name: juicemount-redis
    restart: unless-stopped
    # AOF persistence so JuiceFS metadata survives container restart.
    # Without --appendonly yes a crash loses uncommitted RDB checkpoints
    # and the JuiceFS volume needs a re-format from the user.
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ${REDIS_DATA_DIR:-./data/redis}:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  juicefs-init:
    # One-shot container that formats the JuiceFS volume on first run.
    # `juicefs format` is idempotent — already-formatted = no-op exit 0.
    # depends_on with service_healthy means we wait for minio + redis
    # to be reachable before attempting the format.
    image: juicedata/mount:v1.2.3
    container_name: juicemount-init
    depends_on:
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-juicemount}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set in .env}
    # Bootstrap: create the bucket if absent, then format JuiceFS
    # against it. mc is the MinIO client; juicefs format expects the
    # bucket to already exist.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        # Wait an extra second so MinIO admin API is fully ready
        # (healthcheck passes on /minio/health/live but admin can
        # lag briefly).
        sleep 2
        # mc alias + bucket create (idempotent).
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing local/${JUICEFS_BUCKET:-zpool}
        # Format JuiceFS. Idempotent on a re-run.
        juicefs format \
          --storage minio \
          --bucket http://minio:9000/${JUICEFS_BUCKET:-zpool} \
          --access-key "$$MINIO_ROOT_USER" \
          --secret-key "$$MINIO_ROOT_PASSWORD" \
          redis://redis:6379/1 \
          ${JUICEFS_VOL_NAME:-zpool}
    # No restart — we want this to exit 0 and stay exited.
    restart: "no"

  juicemount-server:
    # Tier-3 iter 2: NFS export side. Builds from the repo root
    # (context: ..) using server/juicemount-server/Dockerfile.
    # depends_on: minio + redis healthy, and juicefs-init exit 0 so
    # the bucket exists and JuiceFS volume is formatted before jm5
    # tries to mount FUSE.
    build:
      context: ..
      dockerfile: server/juicemount-server/Dockerfile
    container_name: juicemount-server
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      juicefs-init:
        condition: service_completed_successfully
    # FUSE needs SYS_ADMIN + /dev/fuse + apparmor unconfined on hosts
    # that ship with that policy. macFUSE doesn't exist on Linux —
    # we use the kernel fuse module. juicefs handles the actual mount
    # syscall inside the container.
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    security_opt:
      - apparmor:unconfined
    ports:
      - "${NFS_PORT:-2049}:2049"
      - "${ADMIN_PORT:-11050}:11050"
    volumes:
      # SQLite metadata.db + pin.db live here. Bind-mount so they
      # survive container churn. Use absolute paths on prod hosts
      # (set JM_DATA_DIR in .env) — the relative default is fine
      # for local-quickstart.
      - ${JM_DATA_DIR:-./data/jm}:/data
    environment:
      # Inherit MinIO creds so jm5 → JuiceFS → MinIO works without
      # the user having to set them in three places.
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-juicemount}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set in .env}
      JM_REDIS: redis://redis:6379/1
      JM_CACHE_SIZE_MB: ${JM_CACHE_SIZE_MB:-100000}
    healthcheck:
      # Same shape as the Dockerfile HEALTHCHECK but on the compose
      # side too so `docker compose ps` shows the right state and
      # `depends_on: service_healthy` works for any future services
      # that need to wait on jm5 to come up.
      test: ["CMD", "curl", "-fsS", "http://localhost:11050/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  caddy:
    # Tier-3 iter 3 (B.5): TLS termination + admin-key gate. Caddy
    # reverse-proxies to MinIO console (port 9001) on / and to the
    # juicemount-server admin API (port 11050) on /api/* — the
    # latter requires the X-JuiceMount-Admin-Key header to match
    # ADMIN_KEY.
    #
    # NFS (2049) is NOT proxied through Caddy. Clients connect
    # directly to the host's 2049. See Caddyfile rationale.
    image: caddy:2.8-alpine
    container_name: juicemount-caddy
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
      juicemount-server:
        condition: service_healthy
    ports:
      - "${CADDY_HTTPS_PORT:-443}:443"
      - "${CADDY_HTTP_PORT:-80}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${CADDY_DATA_DIR:-./data/caddy}:/data
      - ${CADDY_CONFIG_DIR:-./data/caddy-config}:/config
    environment:
      JM_HOSTNAME: ${JM_HOSTNAME:-localhost}
      ADMIN_KEY: "${ADMIN_KEY:?ADMIN_KEY must be set in .env}"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/caddy-health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes: {}
