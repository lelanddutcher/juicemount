# JuiceMount server-side stack — TrueNAS Scale "Install via YAML" reference.
#
# This is the production-tested compose for the JuiceMount NAS app:
#
#   redis                — JuiceFS metadata authority (AOF persistence)
#   minio                — S3 object store for JuiceFS chunks
#   juicefs-init         — one-shot pre-flight + first-time volume format
#   juicefs              — live FUSE mount + WebDAV (browse / smoke test)
#   juicemount-manager   — control-plane web UI (migrations, trash, backups, maintenance, settings) on port 30190
#                          (renamed from juicemount-migrator in SLICE 0 of
#                          docs/ROADMAP/juicemount-manager.md; the legacy
#                          juicemount-migrator image tag is still published
#                          from CI for one release as a backward-compat alias)
#
# The bind-mount paths are TrueNAS-flavored (`/mnt/<pool>/juicemount/*`).
# On a plain Linux/Synology host, edit the `volumes:` paths and the
# `MINIO_ROOT_PASSWORD` value, then `docker compose up -d`.
#
# Pre-flight (juicefs-init) returns named exit codes — see
# server/INSTALL-TrueNAS.md for the table.

services:

  # ── Redis: JuiceFS metadata authority ────────────────────────────
  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    ports:
      - "30179:6379"                # Mac client connects here
    command:
      - "redis-server"
      - "--appendonly"
      - "yes"
      - "--appendfsync"
      - "everysec"
      - "--maxmemory-policy"
      - "noeviction"
      - "--save"
      - "900"
      - "1"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - /mnt/zSSD/juicemount/redis:/data    # EDIT — your Redis dataset path

  # ── MinIO: S3 object store for chunks ────────────────────────────
  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: juicemount
      MINIO_ROOT_PASSWORD: CHANGEME_MINIO_PASSWORD    # EDIT — strong, no whitespace
      MINIO_API_REQUESTS_DEADLINE: 10m
    ports:
      - "30151:9000"                # Mac client connects here
      - "30152:9001"                # MinIO console — web UI
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - /mnt/zSSD/juicemount/bucket:/data   # EDIT — MinIO bucket dataset path

  # ── juicefs-init: pre-flight checks + idempotent format ──────────
  juicefs-init:
    image: juicedata/mount:ce-v1.3.1
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: juicemount
      MINIO_ROOT_PASSWORD: CHANGEME_MINIO_PASSWORD    # EDIT — same as MinIO above
      JM_BUCKET_URL: "http://minio:9000/zpool"
      JM_META_URL: "redis://redis:6379/1"
      JM_VOL_NAME: "zpool"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        sleep 2
        if ! curl -fsS -m 5 http://minio:9000/minio/health/live >/dev/null; then
          echo "[precheck-1] minio unreachable" >&2; exit 2
        fi
        if [ -z "$$MINIO_ROOT_USER" ] || [ -z "$$MINIO_ROOT_PASSWORD" ]; then
          echo "[precheck-3] empty MinIO credentials" >&2; exit 4
        fi
        case "$$MINIO_ROOT_PASSWORD" in CHANGEME*|CHANGE*|REPLACE*|replaceme*)
          echo "[precheck-3] placeholder MinIO password — edit the YAML" >&2; exit 4 ;;
        esac
        case "$$JM_BUCKET_URL" in http://*|https://*) ;; *)
          echo "[precheck-4] bucket URL must start with http:// or https://" >&2; exit 5 ;;
        esac
        if juicefs status "$$JM_META_URL" >/dev/null 2>&1; then
          echo "[precheck-5] already formatted"; exit 0
        fi
        echo "[format] running juicefs format with bucket=$$JM_BUCKET_URL"
        juicefs format --storage minio --bucket "$$JM_BUCKET_URL" \
          --access-key "$$MINIO_ROOT_USER" --secret-key "$$MINIO_ROOT_PASSWORD" \
          --trash-days 0 "$$JM_META_URL" "$$JM_VOL_NAME" || { echo "[format] FAIL" >&2; exit 6; }

  # ── juicefs: live FUSE mount + WebDAV ────────────────────────────
  juicefs:
    image: juicedata/mount:ce-v1.3.1
    restart: unless-stopped
    depends_on:
      juicefs-init:
        condition: service_completed_successfully
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    security_opt:
      - apparmor:unconfined
    ports:
      - "30180:80"                  # WebDAV — Finder Cmd+K
    healthcheck:
      test: ["CMD", "sh", "-c", "mountpoint -q /jfs && curl -sf http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - /mnt/zSSD/juicemount/cache:/jfs-cache    # EDIT — fast-SSD cache path
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        juicefs mount \
          --cache-dir /jfs-cache --cache-size 100000 --buffer-size 4096 --prefetch 3 \
          --backup-meta 3600 \
          redis://redis:6379/1 /jfs &
        sleep 5
        until mountpoint -q /jfs; do sleep 1; done
        mkdir -p /jfs/data /jfs/shared
        chmod 777 /jfs/data /jfs/shared
        juicefs webdav --cache-dir /jfs-cache --cache-size 100000 \
          redis://redis:6379/1 0.0.0.0:80 &
        wait

  # ── juicemount-manager: control-plane web UI for the JuiceFS volume ─
  # Renamed from juicemount-migrator in SLICE 0. Today this tab is
  # Migrations only — Overview, Trash, Destinations, Backups,
  # Maintenance, Settings tabs ship across slices 1–8.
  #
  # Browse host paths under /sources, pick a destination under /jfs,
  # watch live progress via SSE. Set JM_ADMIN_KEY for HTTP auth (the
  # manager owns write access to your data — don't leave it open on
  # the public internet). Empty admin key = LAN-only / no auth.
  juicemount-manager:
    image: ghcr.io/lelanddutcher/juicemount-manager:production-hardening
    pull_policy: always
    restart: unless-stopped
    depends_on:
      juicefs-init:
        condition: service_completed_successfully
    environment:
      JM_META: "redis://redis:6379/1"
      JM_VOL_NAME: "zpool"
      JM_SOURCE_ROOTS: "/sources"
      JM_ADMIN_KEY: ""               # EDIT — set to a 32+ char random string for prod
      JM_STATE_FILE: "/var/lib/manager/state.json"   # persists job history + future control-plane state across container restart
      JM_MINIO_URL: "http://minio:9000"              # SLICE 2: Overview MinIO liveness probe target (internal docker DNS)
    ports:
      - "30190:8080"                 # web UI
    volumes:
      # Mount your existing-data datasets here, read-only. Each gets
      # browsed as /sources/<name> in the UI. Add as many lines as you
      # want — one per existing dataset to migrate from.
      - /mnt/storage0/zpool:/sources/oldzpool:ro    # EDIT — your source dataset(s)
      # Tiny writable mount for the JSON state file. Lets canceled
      # or interrupted jobs show up with a Resume button after a redeploy.
      # SLICE 0 also reads the legacy /var/lib/migrator/jobs.json path
      # as a fallback if the new state file doesn't exist yet, so
      # existing installs migrate job history automatically — but if
      # you want to keep that history, additionally bind-mount the
      # OLD migrator-state dataset at /var/lib/migrator (read-only is fine).
      - /mnt/zSSD/juicemount/manager-state:/var/lib/manager
