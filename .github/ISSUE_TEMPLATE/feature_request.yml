name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Check the [Roadmap](../blob/main/README.md#roadmap) first — some of this may
        already be planned. For open-ended ideas or questions, the Discussions tab is
        often a better fit than an issue.
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What are you trying to do that JuiceMount makes hard or impossible today?
      placeholder: When I'm cutting from two Macs at once, there's no way to tell who has a project open...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What you'd like
      description: Your proposed behavior or feature. Rough is fine.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Workarounds you're using now, or other approaches.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Editing / mount experience
        - Offline / pinning / cache
        - Server setup / Manager UI
        - Search
        - Multi-user / teams
        - Remote access
        - Other
