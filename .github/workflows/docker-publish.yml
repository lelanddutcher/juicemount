# Build and publish the JuiceMount container images to GHCR.
#
# Triggers:
#   - push to main / production-hardening  → tags: <branch>, <branch>-<sha>
#   - tag push matching v*.*.*             → tags: <version>, latest
#
# Three images are published in parallel as a matrix job:
#   ghcr.io/<owner>/juicemount-server    NFSv3 gateway daemon
#   ghcr.io/<owner>/juicemount-manager   data-migration / control-plane web UI (new name)
#   ghcr.io/<owner>/juicemount-migrator  legacy alias of juicemount-manager
#                                        (SLICE 0 compat tag; both images are
#                                        built from server/juicemount-manager/Dockerfile
#                                        for the transition period — drop after
#                                        two releases per docs/ROADMAP/juicemount-manager.md §3.6).
#
# Multi-arch (amd64 + arm64) so the same images run on Intel + Apple
# Silicon TrueNAS hosts and on Synology/QNAP ARM-based NAS units.

name: docker-publish

on:
  push:
    branches:
      - main
      - production-hardening
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: juicemount-server
            dockerfile: server/juicemount-server/Dockerfile
            description: NFSv3 gateway for JuiceFS — self-hosted media editing (includes embedded manager UI)
          - name: juicemount-manager
            dockerfile: server/juicemount-manager/Dockerfile
            description: JuiceMount control-plane web UI (migrations, trash, backups, maintenance, settings)
          # SLICE 0 compat alias: same Dockerfile, published as the
          # pre-rename image name so TrueNAS apps with pull_policy:
          # always on the migrator tag keep working through the
          # transition. Drop this matrix entry two releases after
          # slice-0 ships (see docs/ROADMAP/juicemount-manager.md §3.6).
          - name: juicemount-migrator
            dockerfile: server/juicemount-manager/Dockerfile
            description: DEPRECATED — legacy alias of juicemount-manager; drop after two releases
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for ${{ matrix.name }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.name }}
          tags: |
            # branch name on branch push
            type=ref,event=branch
            # branch + short sha on branch push (immutable per commit).
            # Gated to branch pushes: on a tag push {{branch}} is empty,
            # which would emit the invalid tag ":-<sha>" and fail the build.
            type=sha,prefix={{branch}}-,format=short,enable=${{ github.ref_type == 'branch' }}
            # semver tags on git tag push
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # 'latest' on release tags only
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.title=${{ matrix.name }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          # arm64 build via QEMU is ~3-4x slower than amd64. Keeping it
          # in CI is worth it for the Synology/QNAP ARM cases; revisit
          # if total wall time becomes a real bottleneck.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Per-image GHA cache scope so the matrix jobs don't
          # invalidate each other's layers. juicemount-manager and
          # juicemount-migrator share the same Dockerfile so they
          # share a cache scope — saves one full build during the
          # compat period.
          cache-from: type=gha,scope=${{ matrix.dockerfile }}
          cache-to: type=gha,scope=${{ matrix.dockerfile }},mode=max
