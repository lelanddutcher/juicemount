# Build and publish the juicemount-server container image to GHCR.
#
# Triggers:
#   - push to main / production-hardening  → tags: <branch>, <branch>-<sha>
#   - tag push matching v*.*.*             → tags: <version>, latest
#
# The image is consumed by the TrueNAS app (see juicemount-truenas-apps
# repo, ix-dev/community/juicemount/ix_values.yaml). Until the first
# successful run of this workflow, the catalog references an image tag
# that doesn't exist and Install fails with a manifest-not-found error.
#
# Multi-arch (amd64 + arm64) so the same image runs on Intel macs (via
# rosetta) and on Apple Silicon TrueNAS hosts (rare but legal) and on
# Synology/QNAP ARM-based NAS units.

name: docker-publish

on:
  push:
    branches:
      - main
      - production-hardening
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/juicemount-server

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # branch name on branch push
            type=ref,event=branch
            # branch + short sha on branch push (immutable per commit)
            type=sha,prefix={{branch}}-,format=short
            # semver tags on git tag push
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # 'latest' on release tags only
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.title=juicemount-server
            org.opencontainers.image.description=NFSv3 gateway for JuiceFS — self-hosted media editing
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: server/juicemount-server/Dockerfile
          # arm64 build via QEMU is ~3-4x slower than amd64. Keeping it
          # in CI is worth it for the Synology/QNAP ARM cases; revisit
          # if total wall time becomes a real bottleneck.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers via GHA cache. Significantly speeds up
          # incremental builds (Go compile + linker dominate).
          cache-from: type=gha
          cache-to: type=gha,mode=max
