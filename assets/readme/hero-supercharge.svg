<text x="70" y="84" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" letter-spacing="0.6" fill="rgba(250,253,232,0.72)">for indie filmmakers and small post teams</text>

<text font-family="Inter, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="52" font-weight="600" fill="#FAFDE8">
  <tspan x="69" y="158">Supercharge video</tspan>
  <tspan x="69" y="214">editing off your NAS.</tspan>
</text>

<text x="70" y="256" font-family="Inter, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" fill="rgba(250,253,232,0.72)">Self-hosted cache that streams footage straight from your drives.</text>

