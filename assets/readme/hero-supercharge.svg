<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" width="1200" height="380" role="img" aria-label="JuiceMount hero: Supercharge video editing off your NAS. An isometric stack shows an NLE timeline, an SSD cache warming green, NAS drives, film strips threading footage up into the timeline, and blocks rising from the drives to the cache.">
<title>Supercharge video editing off your NAS</title>
<desc>Animated isometric stack: an NLE timeline with a wandering playhead, film strips threading footage up into it, an SSD cache with cells pulsing green, four NAS drive bays, and green blocks rising from the drives to the cache.</desc>
<style>
  .ph{animation:playhead 8s ease-in-out infinite;transform-box:fill-box}
  .cache-a{animation:cachePulse 8s ease-in-out infinite}
  .cache-b{animation:cachePulse 8s ease-in-out infinite;animation-delay:-2.6s}
  .cache-c{animation:cachePulse 8s ease-in-out infinite;animation-delay:-5.3s}
  .rise1{animation:rise 6s ease-in-out infinite}
  .rise2{animation:rise 6s ease-in-out infinite;animation-delay:-2s}
  .rise3{animation:rise 6s ease-in-out infinite;animation-delay:-4s}
  .clipA{animation:clipGlow 8s ease-in-out infinite}
  .clipB{animation:clipGlow 8s ease-in-out infinite;animation-delay:-4s}
  .thr1{animation:thread 7s linear infinite}
  .thr2{animation:thread 8.2s linear infinite}
  .thr3{animation:thread 6.3s linear infinite}
  @keyframes playhead{0%{transform:translate(0,0)}25%{transform:translate(96px,0)}50%{transform:translate(150px,0)}75%{transform:translate(54px,0)}100%{transform:translate(0,0)}}
  @keyframes cachePulse{0%,100%{opacity:.18}45%,55%{opacity:1}}
  @keyframes clipGlow{0%,100%{opacity:.55}50%{opacity:1}}
  @keyframes rise{0%{transform:translate(0,0);opacity:0}14%{opacity:1}86%{opacity:1}100%{transform:translate(0,-86px);opacity:0}}
  @keyframes thread{from{transform:translate(0,0)}to{transform:translate(0,-108px)}}
  @media (prefers-reduced-motion: reduce){*{animation:none !important}}
</style>
