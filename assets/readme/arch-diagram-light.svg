<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 640" width="1200" height="640" role="img" aria-labelledby="t d">
  <title id="t">JuiceMount architecture</title>
  <desc id="d">Finder, Resolve, or Premiere open files on /Volumes/(name), a volume the macOS NFS client mounts from the JuiceMount NFS server running inside the app on localhost. Three satellites keep the hot path local: an SQLite mirror answers Finder listings locally, an SSD cache with pins serves cached reads at NVMe speed, and an opt-in write spool acks writes locally then trickles them up. Behind the app, a hidden JuiceFS FUSE mount crosses your LAN or WAN to your server, where MinIO or any S3 stores file data as plain S3 objects and Redis stores file metadata. Reads stream only the blocks you touch; writes drain in the background at line speed. Both sides run on hardware you own.</desc>
  <defs>
    <path id="ah" d="M-11,-5.5 L0,0 L-11,5.5 Z" fill="#1B102A"/>
    <path id="ahb" d="M-11,-5.5 L0,0 L-11,5.5 Z" fill="#378ADD"/>
  </defs>
  <g font-family="ui-monospace, SF Mono, Menlo, monospace">

    <!-- boundary: your Mac | your server -->
    <line x1="968" y1="36" x2="968" y2="140" stroke="#1B102A" stroke-width="2" stroke-opacity="0.45" stroke-dasharray="2 7"/>
    <line x1="968" y1="340" x2="968" y2="600" stroke="#1B102A" stroke-width="2" stroke-opacity="0.45" stroke-dasharray="2 7"/>
    <text x="32" y="46" font-size="18" font-weight="600" letter-spacing="0.06em" fill="#1B102A">YOUR MAC</text>
    <text x="32" y="70" font-size="18" fill="#393839">hardware you own</text>
    <text x="1168" y="46" text-anchor="end" font-size="18" font-weight="600" letter-spacing="0.06em" fill="#1B102A">YOUR SERVER</text>
    <text x="1168" y="70" text-anchor="end" font-size="18" fill="#393839">hardware you own</text>

    <!-- read story: server -> apps, only the touched blocks -->
    <path d="M1082,124 L1082,92 L95,92 L95,133" fill="none" stroke="#378ADD" stroke-width="2" stroke-dasharray="7 6"/>
    <use xlink:href="#ahb" transform="translate(95,144) rotate(90)"/>
    <text x="560" y="118" text-anchor="middle" font-size="20" fill="#378ADD">reads — only the blocks you touch stream</text>

    <!-- your apps -->
    <rect x="32" y="148" width="126" height="130" rx="10" fill="#393839" fill-opacity="0.08" stroke="#1B102A" stroke-width="2"/>
    <text x="95" y="192" text-anchor="middle" font-size="20" fill="#1B102A">Finder</text>
    <text x="95" y="218" text-anchor="middle" font-size="20" fill="#1B102A">Resolve</text>
    <text x="95" y="244" text-anchor="middle" font-size="20" fill="#1B102A">Premiere</text>

    <line x1="162" y1="213" x2="183" y2="213" stroke="#1B102A" stroke-width="2"/>
    <use xlink:href="#ah" transform="translate(194,213)"/>

    <!-- the volume -->
    <rect x="198" y="148" width="190" height="130" rx="10" fill="#393839" fill-opacity="0.08" stroke="#1B102A" stroke-width="2"/>
    <text x="293" y="200" text-anchor="middle" font-size="19" font-weight="600" fill="#1B102A">/Volumes/&lt;name&gt;</text>
    <text x="293" y="228" text-anchor="middle" font-size="18" fill="#393839">macOS NFS client</text>

    <text x="440" y="178" text-anchor="middle" font-size="18" fill="#393839">NFS v3</text>
    <text x="440" y="200" text-anchor="middle" font-size="18" fill="#393839">localhost</text>
    <line x1="392" y1="213" x2="477" y2="213" stroke="#1B102A" stroke-width="2"/>
    <use xlink:href="#ah" transform="translate(488,213)"/>

    <!-- the app -->
    <rect x="492" y="148" width="222" height="130" rx="10" fill="#AACD58" fill-opacity="0.12" stroke="#1B102A" stroke-width="2"/>
    <text x="603" y="196" text-anchor="middle" font-size="26" font-weight="600" fill="#1B102A">JuiceMount</text>
    <text x="603" y="226" text-anchor="middle" font-size="18" fill="#393839">in-app NFS server</text>
    <text x="603" y="250" text-anchor="middle" font-size="18" fill="#393839">localhost only</text>

    <text x="742" y="200" text-anchor="middle" font-size="18" fill="#393839">FUSE</text>
    <line x1="718" y1="213" x2="755" y2="213" stroke="#1B102A" stroke-width="2"/>
    <use xlink:href="#ah" transform="translate(766,213)"/>

    <!-- JuiceFS client -->
    <rect x="770" y="148" width="134" height="130" rx="10" fill="#378ADD" fill-opacity="0.10" stroke="#1B102A" stroke-width="2"/>
    <text x="837" y="196" text-anchor="middle" font-size="22" font-weight="600" fill="#1B102A">JuiceFS</text>
    <text x="837" y="224" text-anchor="middle" font-size="18" fill="#393839">FUSE mount</text>
    <text x="837" y="248" text-anchor="middle" font-size="18" fill="#393839">(hidden)</text>

    <!-- the wire -->
    <text x="950" y="170" text-anchor="middle" font-size="18" fill="#393839">LAN/WAN</text>
    <line x1="919" y1="190" x2="981" y2="190" stroke="#1B102A" stroke-width="2"/>
    <use xlink:href="#ah" transform="translate(908,190) rotate(180)"/>
    <use xlink:href="#ah" transform="translate(992,190)"/>
    <line x1="915.1" y1="249.1" x2="984.9" y2="318.9" stroke="#1B102A" stroke-width="2"/>
    <use xlink:href="#ah" transform="translate(908,242) rotate(225)"/>
    <use xlink:href="#ah" transform="translate(992,326) rotate(45)"/>

    <!-- your server -->
    <rect x="996" y="128" width="172" height="124" rx="10" fill="#393839" fill-opacity="0.08" stroke="#1B102A" stroke-width="2"/>
    <text x="1082" y="170" text-anchor="middle" font-size="22" font-weight="600" fill="#1B102A">MinIO / S3</text>
    <text x="1082" y="200" text-anchor="middle" font-size="18" fill="#393839">chunked file data</text>
    <text x="1082" y="226" text-anchor="middle" font-size="18" fill="#393839">(open format)</text>
    <rect x="996" y="282" width="172" height="96" rx="10" fill="#393839" fill-opacity="0.08" stroke="#1B102A" stroke-width="2"/>
    <text x="1082" y="318" text-anchor="middle" font-size="22" font-weight="600" fill="#1B102A">Redis</text>
    <text x="1082" y="348" text-anchor="middle" font-size="18" fill="#393839">file metadata</text>

    <!-- satellite attachment fork -->
    <line x1="603" y1="282" x2="603" y2="344" stroke="#1B102A" stroke-width="2"/>
    <line x1="353" y1="344" x2="853" y2="344" stroke="#1B102A" stroke-width="2"/>
    <line x1="353" y1="344" x2="353" y2="384" stroke="#1B102A" stroke-width="2"/>
    <line x1="603" y1="344" x2="603" y2="384" stroke="#1B102A" stroke-width="2"/>
    <line x1="853" y1="344" x2="853" y2="384" stroke="#1B102A" stroke-width="2"/>

    <!-- satellites: the local hot path -->
    <rect x="248" y="388" width="210" height="132" rx="10" fill="#AACD58" fill-opacity="0.10" stroke="#1B102A" stroke-width="2"/>
    <text x="353" y="430" text-anchor="middle" font-size="20" font-weight="600" fill="#1B102A">SQLite mirror</text>
    <text x="353" y="462" text-anchor="middle" font-size="18" fill="#393839">Finder listings</text>
    <text x="353" y="488" text-anchor="middle" font-size="18" fill="#393839">answer locally</text>

    <rect x="498" y="388" width="210" height="132" rx="10" fill="#AACD58" fill-opacity="0.10" stroke="#1B102A" stroke-width="2"/>
    <text x="603" y="430" text-anchor="middle" font-size="20" font-weight="600" fill="#1B102A">SSD cache + pins</text>
    <text x="603" y="462" text-anchor="middle" font-size="18" fill="#393839">cached reads at</text>
    <text x="603" y="488" text-anchor="middle" font-size="18" fill="#393839">NVMe speed</text>

    <rect x="748" y="388" width="210" height="132" rx="10" fill="#AACD58" fill-opacity="0.10" stroke="#1B102A" stroke-width="2"/>
    <text x="853" y="430" text-anchor="middle" font-size="20" font-weight="600" fill="#1B102A">write spool</text>
    <text x="853" y="462" text-anchor="middle" font-size="18" fill="#393839">writes ack locally</text>
    <text x="853" y="488" text-anchor="middle" font-size="18" fill="#393839">then trickle up</text>

    <!-- write story: spool drains up through JuiceFS in the background -->
    <line x1="890" y1="386" x2="890" y2="293" stroke="#378ADD" stroke-width="2" stroke-dasharray="7 6"/>
    <use xlink:href="#ahb" transform="translate(890,282) rotate(-90)"/>
    <text x="603" y="566" text-anchor="middle" font-size="20" fill="#378ADD">writes — ack on local SSD · background drain at line speed</text>

  </g>
</svg>
